<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table and list testing</title>
    <style>
        .tab {
            margin: 20px;
            background-color: lightgray;
            padding-bottom: 20px;
            padding-left: 20px;
            border: 2px solid black;
            width: 50%;
        }
        .column {
            width: calc(33.33% - 40px);
            float: left;
            margin-right: 20px;
            background-color: lightblue;
            padding-left: 20px;
        }

    </style>
</head>
<body>
    <header>
        <h1>Table and List Testing</h1>
    </header>
    <main>
        <article class="tab">
            <h2>Table</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>City</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Alice</td>
                        <td>30</td>
                        <td>New York</td>
                    </tr>
                    <tr>
                        <td>Bob</td>
                        <td>25</td>
                        <td>Los Angeles</td>
                    </tr>
                    <tr>
                        <td>Charlie</td>
                        <td>35</td>
                        <td>Chicago</td>
                    </tr>
                </tbody>
            </table>
        </article>
        <article>
            
            <div class="column">
                <p>
                    List 1
                </p>
                <ul>
                    <li>Item 1</li>
                    <li>Item 2</li>
                    <li>Item 3</li>
                </ul>
            </div>

            <div class="column">
                <p>
                    List 2
                </p>
                <ul>
                    <li>Item 1</li>
                    <li>Item 2</li>
                    <li>Item 3</li>
                </ul>
            </div>

            <div class="column">
                <p>
                    List 3
                </p>
                <ul>
                    <li>Item 1</li>
                    <li>Item 2</li>
                    <li>Item 3</li>
                </ul>
            </div>
        </article>
    </main>
</body>
</html>
</html>
