<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0" />
    <title>Document</title>
    <style>
        table, th, td{
            border: 2px solid black;
            border-collapse: collapse;
        }
        td{
            padding: 5px;
        }
        th{
            padding: 10px;
        }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th rowspan="2">First Name</th>
        <th rowspan="2">Last Name</th>
        <th colspan="2">Tel No</th>
      </tr>
      <tr>
        <td>Land Phone No.</td>
        <td>Mobile Phone No.</td>
      </tr>

      <tr>
        <td>John</td>
        <td>Doe</td>
        <td></td>
        <td>987-654-3210</td>
      </tr>
      <tr>
        <td>Jane</td>
        <td>Smith</td>
        <td>987-654-3210</td>

      </tr>

      <caption>Details List</caption>
    </table>
  </body>
</html>
