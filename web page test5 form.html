<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form and data entry</title>
 <style>
        /* Applying the animation to the <p> tag */
        p {
            animation-duration: 3s; /* Time for one cycle */
            animation-name: slide-in; /* Name of the animation */
            animation-iteration-count: infinite; /* Animation repeats indefinitely */
            animation-direction: alternate; /* Alternate the direction of the animation */
        }

        /* Keyframes for slide-in effect */
        @keyframes slide-in {
            0% {
                transform: translateX(0%); /* Start from the left */
            }
            100% {
                transform: translateX(70%); /* Move to the right */
            }
        }
    </style>
    
</head>
<body>
<header>
    <h1>TITLE: Forms and Data Entry </h1>

</header>

<main>
    <form action="/submit" method="post" name="testingform" accept-charset="UTF-8">
        <h4>User Infromations</h4>
        <label for="fname">First Name</label>
        <input type="text" id="fname" name="fname" required placeholder="Enter your name"><br/><br/>
        Last Name
        <input type="text" id="lname"  name="lname" required placeholder="Enter your last name"><br/><br/>
<p style="text-color: blue; font-weight: bold;">Gender Selection:</p>
<label>Gender:</label>
<label for="male">Male</label>

        <input type="radio" id="male" name="gender" required value="male">
        <label for="female">Female</label>
        <input type="radio" id="female" name="gender" value="female">


        <h3>Select the birthday: </h3>
        <label for="bd"> Birthday: 
            <input type="date" id="bd" name="bd"  min="1900-01-01" max="2033-12-31"><br/><br/> </label>
        
        City of the Birth:</form><br>
        <label for="City"> City : </label>
        <select name="City" id="City" >
            <option value="" disabled>Select the city where were you born</option>
            <option value="anuradhapura">Anuradhapura</option>
            <option value="polonnaruwa">Polonnaruwa</option>
            <option value="colombo">Colombo</option>
            <option value="gampaha">Gampaha</option>
            <option value="kaluthara">Kaluthara</option>
            <option value="galle">Galle</option>
            <option value="matara">Matara</option>
            <option value="hambantota">Hambantota</option>
            <option value="jaffna">Jaffna</option>
            <option value="vavuniya">Vavuniya</option>
            <option value="trincomalee">Trincomalee</option>
            <option value="ampara">Ampara</option>
            <option value="badulla">Badulla</option>
        </select>
<br><br>
        <textarea name="userComments" id="usercmnt" rows="4" cols="40" placeholder="Enter your coments here"></textarea>
        <br>

        <label for="country">Country : </label>
        <input list="countrylist">
        <datalist id="countrylist">
            <option value="Sri Lanka">
            <option value="India">
            <option value="Pakistan">
            <option value="USA">
            <option value="austrailia">
        </datalist>
        <br>
        <input type="submit" value="Submit" style="
        background-color: transparent;
        border: none;
        padding: 10px 20px; /* Adjust padding as needed */
        color: blue; /* Change the text color */
        cursor: pointer; /* Add a pointer cursor on hover */
        font-size: 16px; /* Adjust font size as needed */
        ">





    </form>
</main>
    <footer>
        <h4>Contact Details
            <details>
                    <p>Mob:</p>
                    <p>Address</p>
            </details>
        </details></h4>
    </footer>
</body>
</html>
