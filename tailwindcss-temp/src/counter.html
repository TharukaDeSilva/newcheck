<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./output.css" rel="stylesheet">
    <title>Counter</title>
</head>
<body class=" min-h-screen flex flex-col  bg-orange-200 items-center justify-center">
    <div class=" bg-gray-400 p-10 w-120 h-100  border-2 border-black flex flex-col items-center justify-center" > 

        <label for="count" id="counter" class="text-center"> 00 </label>
        <div>
            <button type="button" class="font-sans border-2 m-5 p-2 bg-purple-300 hover:bg-purple-500"> Decrement</button>
            
            <button type="button" class="font-sans border-2 m-5 p-2"> Increment</button>
        </div>

        <div>
            <p >Clicks on Increment : <span id="counter-inc">dshhsh</span></p>
            <p >Clicks on Decrement : <span id="counter-dec">jdskdks</span></p>
        </div>
    </div>
</body>
</html>
